<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator Loading...</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    font-family:Arial;
    color:white;
}

/* Loader Box */

.loader-box{
    text-align:center;
}

/* Calculator */

.calculator{
    width:220px;
    padding:20px;
    background:#111;
    border-radius:15px;
    box-shadow:0 0 25px cyan;
}

/* Screen */

.screen{
    height:40px;
    background:black;
    margin-bottom:15px;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    padding-right:10px;
    font-size:20px;
    color:#00ffcc;
}

/* Buttons */

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#222;
    color:white;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:cyan;
    color:black;
}

/* Loading text */

.loading{
    margin-top:15px;
    font-size:18px;
    letter-spacing:2px;
}

/* progress bar */

.bar{
    width:200px;
    height:8px;
    background:#333;
    border-radius:10px;
    margin-top:10px;
    overflow:hidden;
}

.progress{
    height:100%;
    width:0%;
    background:cyan;
    animation:load 5s linear forwards;
}

@keyframes load{
    0%{width:0%;}
    100%{width:100%;}
}

</style>
</head>

<body>

<div class="loader-box">

<div class="calculator">

<div class="screen" id="screen">0</div>

<div class="buttons">
<button>7</button>
<button>8</button>
<button>9</button>
<button>+</button>

<button>4</button>
<button>5</button>
<button>6</button>
<button>-</button>

<button>1</button>
<button>2</button>
<button>3</button>
<button>*</button>

<button>0</button>
<button>.</button>
<button>=</button>
<button>/</button>
</div>

</div>

<div class="loading">Loading Calculator...</div>

<div class="bar">
<div class="progress"></div>
</div>

</div>

<script>

/* Fake calculator animation */

let screen = document.getElementById("screen");

let sequence = [
"5","5+5","10*2","20/2","10+90","100"
];

let i=0;

let interval = setInterval(()=>{
screen.innerText = sequence[i];
i++;

if(i>=sequence.length){
clearInterval(interval);
}

},800);


/* Redirect after loading */

setTimeout(()=>{
window.location.href="home.html"; 
// change to your website page
},5000);

</script>

</body>
</html>
