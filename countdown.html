<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colorful Timer | Majic of Science</title>

<style>

body{
margin:0;
font-family:'Comic Sans MS', cursive;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(45deg,#ff9a9e,#fad0c4,#a18cd1,#84fab0);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

.timer-box{
background:#ffffffee;
padding:35px;
border-radius:20px;
text-align:center;
width:360px;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

h2{
color:#6c5ce7;
margin-bottom:20px;
}

/* CIRCLE TIMER */

.circle{
width:180px;
height:180px;
border-radius:50%;
border:12px solid #eee;
margin:20px auto;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

.progress{
position:absolute;
width:180px;
height:180px;
border-radius:50%;
border:12px solid transparent;
border-top:12px solid #ff7675;
border-right:12px solid #00cec9;
animation:rotate 2s linear infinite;
display:none;
}

@keyframes rotate{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.display{
font-size:28px;
font-weight:bold;
color:#2d3436;
z-index:2;
}

input{
width:70px;
padding:10px;
margin:5px;
border-radius:10px;
border:2px solid #6c5ce7;
font-size:18px;
text-align:center;
}

button{
padding:10px 16px;
margin:8px;
border:none;
border-radius:12px;
background:#00b894;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#019875;
transform:scale(1.1);
}

/* VIDEO POPUP */

#videoBox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

#videoBox video{
width:500px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="timer-box">

<h2>⏱ Colorful Timer</h2>

<input type="number" id="hours" placeholder="H">
<input type="number" id="minutes" placeholder="M">
<input type="number" id="seconds" placeholder="S">

<div class="circle">

<div class="progress" id="progress"></div>

<div class="display" id="display">00:00:00</div>

</div>

<button onclick="startTimer()">Start</button>
<button onclick="stopTimer()">Stop</button>
<button onclick="resetTimer()">Reset</button>

</div>

<div id="videoBox">

<video id="finishVideo" controls>
<source src="beap.mp4" type="video/mp4">
</video>

</div>

<script>

let timer;
let totalSeconds=0;

function startTimer(){

let h = Number(document.getElementById("hours").value);
let m = Number(document.getElementById("minutes").value);
let s = Number(document.getElementById("seconds").value);

totalSeconds = h*3600 + m*60 + s;

document.getElementById("progress").style.display="block";

timer = setInterval(function(){

if(totalSeconds <= 0){

clearInterval(timer);

document.getElementById("progress").style.display="none";

document.getElementById("videoBox").style.display="flex";

document.getElementById("finishVideo").play();

return;
}

totalSeconds--;

let hh = Math.floor(totalSeconds/3600);
let mm = Math.floor((totalSeconds%3600)/60);
let ss = totalSeconds%60;

document.getElementById("display").innerHTML =
String(hh).padStart(2,'0') + ":" +
String(mm).padStart(2,'0') + ":" +
String(ss).padStart(2,'0');

},1000);

}

function stopTimer(){
clearInterval(timer);
}

function resetTimer(){

clearInterval(timer);

totalSeconds=0;

document.getElementById("display").innerHTML="00:00:00";

document.getElementById("progress").style.display="none";

document.getElementById("videoBox").style.display="none";

}

</script>

</body>
</html>
