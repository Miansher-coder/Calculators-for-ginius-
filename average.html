<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Average Calculator | Majic of Science</title>
<style>

/* ===== Body ===== */
body{
margin:0;
padding:0;
font-family:'Comic Sans MS', cursive;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#f093fb,#f5576c);
}

/* ===== Calculator Box ===== */
.calculator{
background:white;
padding:25px;
border-radius:20px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
color:#6c5ce7;
margin-bottom:15px;
}

/* ===== Inputs ===== */
input{
width:90%;
padding:10px;
margin:8px 0;
border-radius:10px;
border:2px solid #6c5ce7;
font-size:16px;
text-align:center;
}

/* ===== Buttons ===== */
.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-top:10px;
}

button{
padding:12px;
border:none;
border-radius:12px;
font-size:16px;
background:#74b9ff;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0984e3;
transform:scale(1.1);
}

.solve{
grid-column:span 2;
background:#00b894;
}

.clear{
grid-column:span 2;
background:#d63031;
}

/* ===== Result ===== */
.result{
margin-top:15px;
font-size:18px;
font-weight:bold;
color:#2d3436;
}

</style>
</head>

<body>

<div class="calculator">

<h2>📊 Average Calculator</h2>

<input type="text" id="numbers" placeholder="Enter numbers separated by comma e.g 5,10,15">

<div class="buttons">
<button onclick="addNum('1')">1</button>
<button onclick="addNum('2')">2</button>
<button onclick="addNum('3')">3</button>
<button onclick="addNum(',')">,</button>

<button onclick="addNum('4')">4</button>
<button onclick="addNum('5')">5</button>
<button onclick="addNum('6')">6</button>
<button onclick="addNum('0')">0</button>

<button onclick="addNum('7')">7</button>
<button onclick="addNum('8')">8</button>
<button onclick="addNum('9')">9</button>
<button onclick="addNum('.')">.</button>

<button class="solve" onclick="calculate()">Calculate</button>
<button class="clear" onclick="clearAll()">Clear</button>
</div>

<div class="result" id="result">Result: </div>

</div>

<script>
function addNum(val){
document.getElementById('numbers').value += val;
}

function clearAll(){
document.getElementById('numbers').value="";
document.getElementById('result').innerHTML="Result:";
}

function calculate(){
let nums=document.getElementById('numbers').value;
if(nums===""){
alert("Enter numbers");
return;
}

let arr=nums.split(',').map(Number);
let sum=arr.reduce((a,b)=>a+b,0);
let avg=sum/arr.length;

document.getElementById('result').innerHTML="Average = "+avg.toFixed(2);
}
</script>

</body>
</html>
